storage:
  # Default provider to use when no routing rules match
  default_provider: "local"

  # Maximum file size (in bytes)
  max_file_size: 104857600 # 100MB

  # Allowed content types
  allowed_content_types:
    - "image/jpeg"
    - "image/png"
    - "image/webp"
    - "image/gif"
    - "video/mp4"
    - "video/webm"
    - "video/quicktime"
    - "audio/mpeg"
    - "audio/wav"
    - "audio/ogg"
    - "text/plain"
    - "application/json"
    - "text/markdown"
    - "application/octet-stream"

  # Storage provider configurations
  providers:
    # Local filesystem storage (development)
    local:
      type: "local"
      config:
        base_path: "/app/data/storage"
        public_url_base: "http://localhost:8800/api/storage"

    # S3-compatible storage (production)
    # Works with AWS S3, Railway Buckets, Fly.io Tigris, MinIO,
    # Cloudflare R2, DigitalOcean Spaces, Backblaze B2, etc.
    # Uncomment and configure for production deployments.
    # s3:
    #   type: "s3"
    #   config:
    #     bucket: "${BUCKET_NAME}"          # or hardcode your bucket name
    #     region: "auto"                    # use "auto" for non-AWS providers
    #     # endpoint_url: "${AWS_ENDPOINT_URL_S3}"  # required for non-AWS S3-compatible services
    #   # Credentials via environment variables:
    #   #   AWS_ACCESS_KEY_ID=...
    #   #   AWS_SECRET_ACCESS_KEY=...

  # Routing rules to select providers based on conditions
  routing_rules:
    # Default fallback (no conditions = always matches)
    # Change to "s3" for production deployments
    - provider: "local"
