# Fly.io configuration for the Boards frontend (Next.js)
# Deploy with: fly launch --config fly.web.toml --copy-config --no-deploy --dockerfile Dockerfile.web
#              fly deploy --config fly.web.toml --dockerfile Dockerfile.web

app = "boards-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
